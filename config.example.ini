; Example configuration for dbus-battery-bank.
;
; Copy to config.ini and adjust for the installation. Every option is required unless documented
; as optional; unknown sections and options are errors, and all problems are reported at once.
;
; Curves and tables are comma-separated input:output points with strictly ascending inputs.
; Values between points are linearly interpolated; values outside the points are clamped to the
; outermost point. Curve outputs are fractions of the corresponding max_amps.
;
; The values below mirror the previously deployed system (see ../dbus-battery-configs) and are
; the phase-1 parity baseline, except ambient_temperature_curve which is new and starts as a
; copy of cell_temperature_curve until tuned for the installation.

[bank]
; Number of cells per pack. Validated against what each BMS reports at startup.
cells_per_pack = 16

; If true, each pack's BMS SoC is reset to 100% when the bank switches from absorption to float,
; when the battery is known to be full. Note: with UP16S, writing SoC works only on some cabling
; configurations, see
; https://github.com/mr-manuel/venus-os_dbus-serialbattery_docs/blob/master/docs/general/connect.md#jbd-bms
auto_reset_soc_on_float_transition = true

; One section per serial port carrying packs, named [battery_port:<device>]. A port holds either
; a daisy chain (the pack at address 0x01 is that chain's master and reports chain-aggregated
; current limits) or a single directly connected pack. Addresses are validated at startup: every
; configured pack must respond, or the service reports an error.
[battery_port:/dev/ttyUSB0]
pack_addresses = 0x01, 0x02, 0x03
; Optional, defaults to false. Set to true when this port is wired directly to a single pack
; (e.g. one adapter per BMS): the pack must then also answer commands that only work on a
; direct connection, which allows fetching slightly more data. Leave false for a daisy chain,
; where only the chain master is directly connected. See
; https://github.com/mr-manuel/venus-os_dbus-serialbattery_docs/blob/master/docs/general/connect.md#jbd-bms
require_direct_connection = false

; Optional section: a Victron SmartShunt read directly over the VE.Direct text protocol (not via
; D-Bus). It provides the bank current (higher resolution and precision than the BMS, which does
; not report currents below 1 A), bank SoC, consumed Ah, and the Aux input voltage used by
; [ptc_protection]. For the required shunt setup see
; https://community.victronenergy.com/t/mismatch-smartshunt-500a-and-specifications/50145/39
[shunt]
port = /dev/ttySH

[cell_voltage]
; Lower bound for the charge voltage limit (CVL) controller, and the published low-voltage
; threshold. This is not a discharge cut-off: discharge protection comes from
; [discharge_current] cell_voltage_curve and from the BMS itself.
min_volts = 2.77
; Bulk/absorption target per cell. CVL is this value times cells_per_pack while charging.
; Keep a margin of roughly 0.05-0.10 V below the BMS over-voltage protection threshold.
max_volts = 3.60
; Resting target per cell after the battery is fully charged.
float_volts = 3.325

; The bank charge stage machine: Bulk -> Absorption (full and balanced, held for the configured
; time) -> FloatTransition (slow voltage ramp down) -> Float -> back to Bulk when SoC drops.
[charge_stage]
; How long the bank must stay full and balanced at maximum voltage before switching to float.
absorption_hold_seconds = 300
; Cell voltage difference at or below which the cells count as balanced.
balanced_cell_diff_volts = 0.020
; Exceeding balanced_cell_diff_volts by more than this margin restarts the absorption hold
; timer, so the hold is not restarted by measurement noise right at the threshold.
balanced_cell_diff_restart_margin_volts = 0.003
; When any pack's SoC falls below this, the bank returns from Float to Bulk. This also drives
; periodic cell balancing: each bulk-absorption cycle balances at maximum voltage.
rebulk_soc_percent = 96
; A pack counts as full when its cell-voltage sum is within this tolerance below the charge
; stage target (cells_per_pack * max_volts). The charger regulates CVL at its own voltage
; sense, which reads a few tens of mV apart from the BMS, so the BMS-measured sum plateaus
; below the target and an exact comparison would never be satisfied; this must exceed that
; steady-state gap with margin. Declaring full slightly early is safe: [charge_current]
; cell_voltage_curve tapers current to near zero at these voltages (full implies low current),
; and on LFP the last few mV per cell hold negligible capacity.
full_detection_tolerance_volts = 0.08

; Cell over-voltage protection: an I-controller lowers CVL when the highest cell in the bank
; exceeds max_volts plus setpoint_margin_volts, and raises it back (rate-limited) when it drops
; below. This prevents a single runaway cell in a poorly balanced bank from tripping the BMS
; over-voltage protection, while still allowing full charge current in a balanced bank.
; Background: https://github.com/Louisvdw/dbus-serialbattery/pull/882
[cvl_controller]
; Integrator gain. 0.2 V/Vs has proven stable and fast in practice.
volts_per_volt_second = 0.2
; The controller regulates the highest cell towards max_volts plus this margin, leaving room
; for the balancer to work on the highest cell.
setpoint_margin_volts = 0.020

; Charge current limit (CCL). The effective per-pack limit is the minimum over: max_amps, the
; pack's own BMS limit, the chain master's aggregated limit, and max_amps times each curve's
; fraction. The bank limit is the lowest per-pack limit times the number of packs.
[charge_current]
; Maximum charge current per pack.
max_amps = 10.0
; Input: the highest cell voltage in the pack. Tapers current near full to prevent single-cell
; overshoot together with [cvl_controller].
cell_voltage_curve = 3.375:1.00, 3.450:0.25, 3.600:0.02, 3.630:0.00
; Input: pack cell temperature sensors; the curve is evaluated at both the lowest and the
; highest sensor and the worse (lower) fraction wins. Protects against charging too cold or
; too hot.
cell_temperature_curve = 2:0.00, 3:0.20, 5:0.40, 10:1.00, 42:1.00, 48:0.00
; Input: the pack's ambient temperature sensor (typically the warmest reading in the
; installation). New in this project; starts as a copy of cell_temperature_curve.
ambient_temperature_curve = 2:0.00, 3:0.20, 5:0.40, 10:1.00, 42:1.00, 48:0.00
; Input: the BMS MOSFET temperature sensor.
mosfet_temperature_curve = 70:1.00, 80:0.25, 90:0.00
; After the limit reached zero, hold it at zero until the recovered limit exceeds this fraction
; of max_amps, preventing rapid flapping around zero.
zero_recovery_min_fraction = 0.015

; Discharge current limit (DCL); the same mechanics as [charge_current].
[discharge_current]
; Maximum discharge current per pack.
max_amps = 250.0
; Input: the lowest cell voltage in the pack. The BMS firmware hard-sets DCL to 0 below
; 2700 mV minimum cell voltage (not configurable), so this curve cuts current just above that.
cell_voltage_curve = 2.709:0.00, 2.710:1.00
cell_temperature_curve = -18:0.00, -17:1.00, 49:1.00, 50:0.00
ambient_temperature_curve = -18:0.00, -17:1.00, 49:1.00, 50:0.00
mosfet_temperature_curve = 70:1.00, 80:0.25, 90:0.00
zero_recovery_min_fraction = 0.015

; When recalculated CCL/DCL values are actually published. Between publishes the previous value
; is kept, avoiding constant small adjustments that would make the charger hunt. A drop to zero
; is always published immediately.
[limit_update_policy]
min_update_interval_seconds = 60
; Publish immediately when the new value differs from the published one by more than this
; fraction of the published value.
immediate_update_change_fraction = 0.33

[protection]
; Optional: latch CCL and DCL to zero when the span between the lowest and highest cell
; temperature across the whole bank exceeds this, indicating a sensor fault or a localized
; thermal problem. The latch persists across restarts and requires an operator reset.
; Omit the option to disable the check.
max_temperature_spread_celsius = 10

; Optional section: independent overheat detection via a chain of PTC thermistors on the shunt
; Aux input. The measured Aux voltage is compared against the voltage expected at the current
; battery temperature; a large deviation means some spot in the chain is far hotter (or the
; chain is broken/shorted), and CCL/DCL latch to zero until an operator reset. Requires the
; [shunt] section. Background:
; https://diysolarforum.com/threads/diy-overheating-fire-prevention-system.122239/
[ptc_protection]
; temperature:volts points calculated from the PTC datasheet for the installed chain.
expected_aux_voltage_by_temperature = -20:0.740, -5:0.689, 5:0.676, 10:0.685, 15:0.702, 20:0.732, 25:0.777, 30:0.840, 35:0.924, 40:1.031, 43:1.109, 47.5:1.287, 50:1.446, 59:2.313, 65:3.151, 71.5:4.154, 96:4.912
; PTC resistance depends on more than temperature, and fast ambient changes reach the battery
; temperature sensors slowly, so keep this high enough (roughly 20-50) to avoid false trips.
; Values above 95 are not meaningful: they would accept an Aux voltage of 0, which is what a
; disconnected or unpowered chain reads.
max_deviation_percent = 20
; How often a fresh battery temperature reading is fed into the thermal-inertia correction
; filter. Must slightly exceed the interval at which pack temperature readings actually change.
temperature_sample_interval_seconds = 60
; Process variance of the Kalman filter smoothing the battery temperature; lower values give a
; smoother inertia-corrected estimate.
temperature_filter_process_variance = 1e-13
; Time constant (tau) of the battery temperature sensors, measurable from how quickly the
; sensor readings follow a step change in real temperature. Used to estimate the actual current
; temperature ahead of the slow sensors before looking up the expected Aux voltage.
temperature_sensor_time_constant_minutes = 480

; Snapshot ages beyond which data counts as stale. Stale pack or shunt data raises an alarm and
; switches the affected values to their safe fallbacks (conservative limits, BMS SoC instead of
; shunt SoC).
[staleness]
pack_data_max_age_seconds = 30
shunt_data_max_age_seconds = 30
